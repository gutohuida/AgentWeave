services:
  hub:
    # Prefer the locally-built `agentweave-hub:audit` image (built by
    # `make hub-full-build`) so audit-branch code is in use. Falls back
    # to the published v0.31.2 image if no local build exists.
    image: ${AW_HUB_IMAGE:-agentweave-hub:audit}
    ports:
      - "${AW_PORT:-8000}:8000"
    volumes:
      - hub-data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/agentweave.db
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  hub-data:
